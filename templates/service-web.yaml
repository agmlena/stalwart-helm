apiVersion: v1
kind: Service
metadata:
  name: {{ include "stalwart.fullname" . }}-web
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
  {{- with .Values.webService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.webService.type }}
  selector:
    {{- include "stalwart.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
