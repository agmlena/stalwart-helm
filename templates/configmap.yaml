apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
data:
  config.toml: |
    [server]
    hostname = {{ .Values.hostname | quote }}
    {{- if .Values.stalwart.security.allowedIp }}
    allowed-ip = {{ .Values.stalwart.security.allowedIp | toJson }}
    {{- end }}

    [server.listener.smtp]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.smtp.port }}"]
    protocol = "smtp"

    [server.listener.smtps]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.smtps.port }}"]
    protocol = "smtp"
    tls.implicit = true

    [server.listener.submission]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.submission.port }}"]
    protocol = "smtp"

    [server.listener.imaptls]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.imaps.port }}"]
    protocol = "imap"
    tls.implicit = true

    [server.listener.imap]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.imap.port }}"]
    protocol = "imap"

    [server.listener.sieve]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.sieve.port }}"]
    protocol = "managesieve"

    [server.listener.https]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.https.port }}"]
    protocol = "http"
    tls.implicit = true

    [server.listener.http]
    bind = ["0.0.0.0:{{ .Values.stalwart.listeners.http.port }}"]
    protocol = "http"

    {{- if .Values.stalwart.proxy.trustedNetworks }}
    [server.proxy]
    trusted-networks = {{ .Values.stalwart.proxy.trustedNetworks | toJson }}
    {{- end }}

    {{- if eq .Values.stalwart.storage.backend "postgres" }}
    # ---- PostgreSQL store ----
    [store.db]
    type = "postgresql"
    host = {{ .Values.stalwart.storage.postgres.host | quote }}
    port = {{ .Values.stalwart.storage.postgres.port }}
    database = "%{env:DB_DATABASE}%"
    user = "%{env:DB_USER}%"
    password = "%{env:DB_PASSWORD}%"
    tls.enable = {{ .Values.stalwart.storage.postgres.tls.enabled }}
    tls.allow-invalid-certs = {{ .Values.stalwart.storage.postgres.tls.allowInvalidCerts }}
    pool.max-connections = {{ .Values.stalwart.storage.postgres.pool.maxConnections }}

    [storage]
    data = "db"
    fts = "db"
    lookup = "db"
    {{- if and .Values.stalwart.oidc.enabled .Values.stalwart.oidc.replaceDirectory }}
    directory = "oidc"
    {{- else }}
    directory = "internal"
    {{- end }}
    {{- if eq .Values.stalwart.storage.blobBackend "s3" }}
    blob = "blob-s3"
    {{- else }}
    blob = "db"
    {{- end }}

    [directory.internal]
    type = "internal"
    store = "db"

    {{- if .Values.stalwart.oidc.enabled }}
    # ---- OIDC directory ----
    [directory."oidc"]
    type = "oidc"
    timeout = {{ .Values.stalwart.oidc.timeout | quote }}
    endpoint.url = {{ .Values.stalwart.oidc.endpointUrl | quote }}
    endpoint.method = {{ .Values.stalwart.oidc.endpointMethod | quote }}
    {{- if ne .Values.stalwart.oidc.auth.method "none" }}
    auth.method = {{ .Values.stalwart.oidc.auth.method | quote }}
    {{- if eq .Values.stalwart.oidc.auth.method "basic" }}
    auth.username = {{ .Values.stalwart.oidc.auth.username | quote }}
    auth.secret = "%{env:OIDC_CLIENT_SECRET}%"
    {{- else if eq .Values.stalwart.oidc.auth.method "token" }}
    auth.token = "%{env:OIDC_CLIENT_SECRET}%"
    {{- end }}
    {{- end }}
    fields.email = {{ .Values.stalwart.oidc.fields.email | quote }}
    fields.username = {{ .Values.stalwart.oidc.fields.username | quote }}
    fields.full-name = {{ .Values.stalwart.oidc.fields.fullName | quote }}
    {{- end }}

    {{- if eq .Values.stalwart.storage.blobBackend "s3" }}
    # ---- S3 blob store ----
    [store.blob-s3]
    type = "s3"
    bucket = {{ .Values.stalwart.storage.s3.bucket | quote }}
    region = {{ .Values.stalwart.storage.s3.region | quote }}
    {{- if .Values.stalwart.storage.s3.endpoint }}
    endpoint = {{ .Values.stalwart.storage.s3.endpoint | quote }}
    {{- end }}
    access-key = "%{env:S3_ACCESS_KEY}%"
    secret-key = "%{env:S3_SECRET_KEY}%"
    timeout = {{ .Values.stalwart.storage.s3.timeout | quote }}
    {{- end }}

    {{- else }}
    # ---- RocksDB store ----
    [store.rocksdb]
    type = "rocksdb"
    path = {{ .Values.stalwart.storage.dataDir | quote }}

    [storage]
    data = "rocksdb"
    blob = "rocksdb"
    fts = "rocksdb"
    lookup = "rocksdb"
    {{- if and .Values.stalwart.oidc.enabled .Values.stalwart.oidc.replaceDirectory }}
    directory = "oidc"
    {{- else }}
    directory = "internal"
    {{- end }}

    [directory.internal]
    type = "internal"
    store = "rocksdb"

    {{- if .Values.stalwart.oidc.enabled }}
    # ---- OIDC directory ----
    [directory."oidc"]
    type = "oidc"
    timeout = {{ .Values.stalwart.oidc.timeout | quote }}
    endpoint.url = {{ .Values.stalwart.oidc.endpointUrl | quote }}
    endpoint.method = {{ .Values.stalwart.oidc.endpointMethod | quote }}
    {{- if ne .Values.stalwart.oidc.auth.method "none" }}
    auth.method = {{ .Values.stalwart.oidc.auth.method | quote }}
    {{- if eq .Values.stalwart.oidc.auth.method "basic" }}
    auth.username = {{ .Values.stalwart.oidc.auth.username | quote }}
    auth.secret = "%{env:OIDC_CLIENT_SECRET}%"
    {{- else if eq .Values.stalwart.oidc.auth.method "token" }}
    auth.token = "%{env:OIDC_CLIENT_SECRET}%"
    {{- end }}
    {{- end }}
    fields.email = {{ .Values.stalwart.oidc.fields.email | quote }}
    fields.username = {{ .Values.stalwart.oidc.fields.username | quote }}
    fields.full-name = {{ .Values.stalwart.oidc.fields.fullName | quote }}
    {{- end }}
    {{- end }}

    [tracer.stdout]
    type = "stdout"
    level = {{ .Values.stalwart.logLevel | quote }}
    enable = true

    {{- with .Values.stalwart.configOverrides }}
    {{ . | nindent 4 }}
    {{- end }}
