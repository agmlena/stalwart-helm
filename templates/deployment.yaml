apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.stalwart.replicas }}
  revisionHistoryLimit: {{ .Values.stalwart.revisionHistoryLimit }}
  {{- with .Values.stalwart.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "stalwart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.stalwart.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "stalwart.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "stalwart.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.stalwart.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.stalwart.podSecurityContext | nindent 8 }}
      {{- with .Values.stalwart.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stalwart.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.stalwart.storage.backend "postgres" }}
      initContainers:
        - name: wait-for-postgres
          image: {{ include "stalwart.initImage" . }}
          imagePullPolicy: {{ .Values.stalwart.initContainerImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.stalwart.initContainerSecurityContext | nindent 12 }}
          command: ['sh', '-c']
          args:
            - |
              until pg_isready \
                -h {{ .Values.stalwart.storage.postgres.host | quote }} \
                -p {{ .Values.stalwart.storage.postgres.port }} \
                -U "$DB_USER"; do
                echo "Waiting for PostgreSQL at {{ .Values.stalwart.storage.postgres.host }}:{{ .Values.stalwart.storage.postgres.port }}..."
                sleep 2
              done
              echo "PostgreSQL is ready."
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.dbSecretName" . }}
                  key: {{ .Values.stalwart.storage.postgres.secretUserKey }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      {{- end }}
      containers:
        - name: stalwart
          image: {{ include "stalwart.image" . }}
          imagePullPolicy: {{ .Values.stalwart.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.stalwart.securityContext | nindent 12 }}
          ports:
            - name: smtp
              containerPort: {{ .Values.stalwart.listeners.smtp.port }}
              protocol: TCP
            - name: smtps
              containerPort: {{ .Values.stalwart.listeners.smtps.port }}
              protocol: TCP
            - name: submission
              containerPort: {{ .Values.stalwart.listeners.submission.port }}
              protocol: TCP
            - name: imap
              containerPort: {{ .Values.stalwart.listeners.imap.port }}
              protocol: TCP
            - name: imaps
              containerPort: {{ .Values.stalwart.listeners.imaps.port }}
              protocol: TCP
            - name: sieve
              containerPort: {{ .Values.stalwart.listeners.sieve.port }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.stalwart.listeners.https.port }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.stalwart.listeners.http.port }}
              protocol: TCP
          env:
            {{- if eq .Values.stalwart.storage.backend "postgres" }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.dbSecretName" . }}
                  key: {{ .Values.stalwart.storage.postgres.secretUserKey }}
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.dbSecretName" . }}
                  key: {{ .Values.stalwart.storage.postgres.secretDatabaseKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.dbSecretName" . }}
                  key: {{ .Values.stalwart.storage.postgres.secretPasswordKey }}
            {{- end }}
            {{- if and .Values.stalwart.oidc.enabled (ne .Values.stalwart.oidc.auth.method "none") }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.oidcSecretName" . }}
                  key: {{ .Values.stalwart.oidc.secretKey }}
            {{- end }}
            {{- if eq .Values.stalwart.storage.blobBackend "s3" }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.s3SecretName" . }}
                  key: {{ .Values.stalwart.storage.s3.secretAccessKeyKey }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "stalwart.s3SecretName" . }}
                  key: {{ .Values.stalwart.storage.s3.secretSecretKeyKey }}
            {{- end }}
            {{- with .Values.stalwart.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.stalwart.storage.dataDir }}
            - name: etc
              mountPath: /opt/stalwart-mail/etc
            - name: config
              mountPath: /opt/stalwart-mail/etc/config.toml
              subPath: config.toml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.stalwart.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.stalwart.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.stalwart.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.stalwart.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.stalwart.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.stalwart.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.stalwart.persistence.existingClaim | default (printf "%s-data" (include "stalwart.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: etc
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "stalwart.fullname" . }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.stalwart.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.stalwart.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stalwart.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stalwart.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
