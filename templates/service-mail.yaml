apiVersion: v1
kind: Service
metadata:
  name: {{ include "stalwart.fullname" . }}-mail
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
  {{- with .Values.mailService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mailService.type }}
  {{- if and (eq .Values.mailService.type "LoadBalancer") .Values.mailService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.mailService.loadBalancerIP }}
  {{- end }}
  {{- if and (eq .Values.mailService.type "LoadBalancer") .Values.mailService.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.mailService.externalTrafficPolicy }}
  {{- end }}
  selector:
    {{- include "stalwart.selectorLabels" . | nindent 4 }}
  ports:
    - name: smtp
      port: 25
      targetPort: smtp
      protocol: TCP
    - name: smtps
      port: 465
      targetPort: smtps
      protocol: TCP
    - name: submission
      port: 587
      targetPort: submission
      protocol: TCP
    - name: imap
      port: 143
      targetPort: imap
      protocol: TCP
    - name: imaps
      port: 993
      targetPort: imaps
      protocol: TCP
    - name: sieve
      port: 4190
      targetPort: sieve
      protocol: TCP
