# -- Stalwart Mail Server Helm Chart Values

# -- Mail server hostname (FQDN)
hostname: mail.example.com

stalwart:
  image:
    repository: stalwartlabs/stalwart
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent

  # -- Number of replicas. >1 supported with PostgreSQL backend.
  replicas: 1

  # -- Deployment revision history to retain
  revisionHistoryLimit: 3

  # -- Seconds to wait for SMTP transactions to complete before termination
  terminationGracePeriodSeconds: 60

  # -- Deployment strategy. RollingUpdate is safe with PostgreSQL (no local state).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # ---------------------------------------------------------------------------
  # Storage backend configuration
  # ---------------------------------------------------------------------------
  storage:
    # -- Primary backend for data, fts, and lookup stores.
    # Supported: postgres, rocksdb
    backend: postgres

    # -- Blob storage backend. Where email message bodies and attachments are stored.
    # "postgres" = same database as the primary backend (simplest)
    # "s3"       = S3-compatible object storage (scalable; configure storage.s3 below)
    blobBackend: postgres

    # -- PostgreSQL connection (required when backend=postgres)
    postgres:
      host: ""
      port: 5432
      # -- Database name (ignored if existingSecret is set and secretDatabaseKey is provided)
      database: stalwart
      # -- Username (ignored if existingSecret is set and secretUserKey is provided)
      user: stalwart
      # -- Password (ignored if existingSecret is set)
      password: ""
      # -- Use an existing Secret containing database credentials.
      # Compatible with secrets created by CloudNativePG, Zalando Postgres Operator, etc.
      existingSecret: ""
      # -- Keys within the Secret that hold the credentials
      secretUserKey: user
      secretDatabaseKey: dbname
      secretPasswordKey: password
      tls:
        enabled: false
        allowInvalidCerts: false
      pool:
        maxConnections: 10

    # -- S3 blob storage (required when blobBackend=s3)
    s3:
      bucket: ""
      region: us-east-1
      # -- Custom endpoint for S3-compatible stores (MinIO, Ceph, etc.)
      endpoint: ""
      # -- Credentials (ignored if existingSecret is set)
      accessKey: ""
      secretKey: ""
      # -- Use an existing Secret for S3 credentials
      existingSecret: ""
      # -- Keys within the Secret
      secretAccessKeyKey: access-key
      secretSecretKeyKey: secret-key
      timeout: "30s"

    # -- Local data directory inside the container (used by RocksDB, or for temp/cache)
    dataDir: /opt/stalwart-mail/data

  # -- Local persistence. Not required with PostgreSQL backend (all state is in the DB).
  # Enable only if you need local disk for caching or if using RocksDB.
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""

  # -- Extra environment variables
  env: []

  # -- Extra volume mounts for the stalwart container
  extraVolumeMounts: []

  # -- Extra volumes for the pod
  extraVolumes: []

  # -- Image pull secrets
  imagePullSecrets: []

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}

  # -- Topology spread constraints (for multi-replica scheduling)
  topologySpreadConstraints: []

  # -- Pod annotations
  podAnnotations: {}

  # ---------------------------------------------------------------------------
  # Security (Pod Security Standards "restricted" profile by default)
  # ---------------------------------------------------------------------------

  # -- Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # -- Stalwart container security context.
  # NET_BIND_SERVICE is required for privileged ports (25, 143, 443, 465, 587, 993).
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
      add: [NET_BIND_SERVICE]

  # -- Init container (wait-for-postgres) image
  initContainerImage:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent

  # -- Init container security context (no NET_BIND_SERVICE needed)
  initContainerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    capabilities:
      drop: [ALL]

  # ---------------------------------------------------------------------------
  # OIDC authentication (optional)
  # ---------------------------------------------------------------------------
  # Stalwart validates OAUTHBEARER tokens by calling the provider's endpoint.
  # Mail clients must obtain their own tokens from the OIDC provider first.
  oidc:
    enabled: false
    # -- UserInfo or Token Introspection endpoint URL
    endpointUrl: ""
    # -- "userinfo" or "introspect"
    endpointMethod: userinfo
    timeout: "15s"
    auth:
      # -- How Stalwart authenticates to the endpoint: "none", "basic", or "token"
      method: none
      # -- OIDC client_id (used as HTTP Basic username when method=basic)
      username: ""
      # -- Client secret or bearer token (ignored if existingSecret is set)
      secret: ""
    # -- Use an existing Secret for the OIDC client secret
    existingSecret: ""
    # -- Key within the Secret that holds the client secret
    secretKey: oidc-client-secret
    # -- OIDC claim-to-field mapping
    fields:
      email: email
      username: preferred_username
      fullName: name

  # -- Stalwart TOML config overrides (appended verbatim to the generated config)
  configOverrides: ""

  # -- Listeners configuration
  listeners:
    smtp:
      port: 25
    smtps:
      port: 465
    submission:
      port: 587
    imap:
      port: 143
    imaps:
      port: 993
    sieve:
      port: 4190
    https:
      port: 443
    http:
      port: 8080

  # -- Startup probe (allows slow first-boot initialization)
  startupProbe:
    httpGet:
      path: /healthz/live
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 24

  # -- Liveness probe
  livenessProbe:
    httpGet:
      path: /healthz/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3

  # -- Readiness probe
  readinessProbe:
    httpGet:
      path: /healthz/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  # -- Log level: trace, debug, info, warn, error
  logLevel: info

# -- Mail service (LoadBalancer for SMTP/IMAP ports)
mailService:
  type: LoadBalancer
  annotations: {}
  externalTrafficPolicy: Local
  loadBalancerIP: ""

# -- Web service (ClusterIP, fronted by Ingress)
webService:
  type: ClusterIP
  annotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  # -- Disable automatic API token mount (pods don't need K8s API access)
  automountServiceAccountToken: false

# -- PodDisruptionBudget (useful with replicas > 1)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- Ingress for web UI, JMAP, CalDAV, CardDAV, webmail
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mail.example.com
      paths:
        - path: /
          pathType: Prefix
          service: stalwart
  tls: []

# -- TLS certificate via cert-manager
certificate:
  enabled: false
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames: []
  secretName: mail-tls

# ---------------------------------------------------------------------------
# SnappyMail webmail (optional)
# ---------------------------------------------------------------------------
webmail:
  enabled: false
  image:
    repository: djmaze/snappymail
    tag: "2.38.2"
    pullPolicy: IfNotPresent
  replicas: 1
  revisionHistoryLimit: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8888
  ingressPath: /webmail
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 82
    runAsGroup: 82
    fsGroup: 82
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# ---------------------------------------------------------------------------
# ClamAV antivirus (optional)
# ---------------------------------------------------------------------------
clamav:
  enabled: false
  image:
    repository: clamav/clamav
    tag: "1.4"
    pullPolicy: IfNotPresent
  replicas: 1
  revisionHistoryLimit: 3
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
  service:
    port: 3310
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  # -- ClamAV takes several minutes to load virus DB on startup
  startupProbe:
    tcpSocket:
      port: clamd
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 60
  livenessProbe:
    tcpSocket:
      port: clamd
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: clamd
    periodSeconds: 10
    failureThreshold: 3
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Backup (optional)
# ---------------------------------------------------------------------------
backup:
  enabled: false
  schedule: "0 3 * * *"
  # -- Backup method:
  #   "pgdump"        = pg_dump to a PVC (simple, self-contained)
  #   "pgdump-restic" = pg_dump then push to restic repository (offsite)
  method: pgdump-restic
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  pgdump:
    image:
      repository: postgres
      tag: "17-alpine"
      pullPolicy: IfNotPresent
    persistence:
      storageClass: ""
      size: 20Gi
    retainCount: 7
  restic:
    image:
      repository: restic/restic
      tag: "0.17.3"
      pullPolicy: IfNotPresent
    repository: ""
    existingSecret: ""
  retention:
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  pgdumpSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    capabilities:
      drop: [ALL]
  resticSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop: [ALL]
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# Network Policy (optional)
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  stalwart:
    extraIngress: []
    extraEgress: []
  webmail:
    extraIngress: []
    extraEgress: []
  clamav:
    extraIngress: []
    extraEgress: []

# -- Prometheus ServiceMonitor (optional)
metrics:
  enabled: false
  interval: 30s
  path: /metrics
  port: http
