# -- Stalwart Mail Server Helm Chart Values

# -- Mail server hostname (FQDN)
hostname: mail.example.com

stalwart:
  image:
    repository: stalwartlabs/stalwart
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent

  # -- Number of replicas. >1 supported with PostgreSQL backend.
  replicas: 1

  # -- Deployment strategy. RollingUpdate is safe with PostgreSQL (no local state).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # ---------------------------------------------------------------------------
  # Storage backend configuration
  # ---------------------------------------------------------------------------
  storage:
    # -- Primary backend for data, fts, and lookup stores.
    # Supported: postgres, rocksdb
    backend: postgres

    # -- Blob storage backend. Where email message bodies and attachments are stored.
    # "postgres" = same database as the primary backend (simplest)
    # "s3"       = S3-compatible object storage (scalable; configure storage.s3 below)
    blobBackend: postgres

    # -- PostgreSQL connection (required when backend=postgres)
    postgres:
      host: ""
      port: 5432
      database: stalwart
      user: stalwart
      # -- Password (ignored if existingSecret is set)
      password: ""
      # -- Use an existing Secret for the database password
      existingSecret: ""
      # -- Key within the Secret that holds the password
      secretPasswordKey: password
      tls:
        enabled: false
        allowInvalidCerts: false
      pool:
        maxConnections: 10

    # -- S3 blob storage (required when blobBackend=s3)
    s3:
      bucket: ""
      region: us-east-1
      # -- Custom endpoint for S3-compatible stores (MinIO, Ceph, etc.)
      endpoint: ""
      # -- Credentials (ignored if existingSecret is set)
      accessKey: ""
      secretKey: ""
      # -- Use an existing Secret for S3 credentials
      existingSecret: ""
      # -- Keys within the Secret
      secretAccessKeyKey: access-key
      secretSecretKeyKey: secret-key
      timeout: "30s"

    # -- Local data directory inside the container (used by RocksDB, or for temp/cache)
    dataDir: /opt/stalwart-mail/data

  # -- Local persistence. Not required with PostgreSQL backend (all state is in the DB).
  # Enable only if you need local disk for caching or if using RocksDB.
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""

  # -- Extra environment variables
  env: []
  #   - name: FOO
  #     value: bar

  # -- Extra volume mounts for the stalwart container
  extraVolumeMounts: []

  # -- Extra volumes for the pod
  extraVolumes: []

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext: {}

  # -- Container security context
  securityContext: {}

  # -- Stalwart TOML config overrides (appended verbatim to the generated config)
  # Use this for settings not covered by values. See https://stalw.art/docs/
  configOverrides: ""
  # configOverrides: |
  #   [spam-filter.header.antivirus]
  #   enable = true
  #   host = "clamav.mail.svc.cluster.local"
  #   port = 3310

  # -- Listeners configuration
  listeners:
    smtp:
      port: 25
    smtps:
      port: 465
    submission:
      port: 587
    imap:
      port: 143
    imaps:
      port: 993
    sieve:
      port: 4190
    https:
      port: 443
    http:
      port: 8080

  # -- Liveness probe
  livenessProbe:
    httpGet:
      path: /healthz/live
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3

  # -- Readiness probe
  readinessProbe:
    httpGet:
      path: /healthz/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  # -- Log level: trace, debug, info, warn, error
  logLevel: info

# -- Mail service (LoadBalancer for SMTP/IMAP ports)
mailService:
  type: LoadBalancer
  annotations: {}
  #   metallb.universe.tf/address-pool: mail-pool
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  # -- Preserve source IP for SPF checks. Set to Local for production.
  externalTrafficPolicy: Local
  # -- Static IP if supported by provider
  loadBalancerIP: ""

# -- Web service (ClusterIP, fronted by Ingress)
webService:
  type: ClusterIP
  annotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- PodDisruptionBudget (useful with replicas > 1)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Ingress for web UI, JMAP, CalDAV, CardDAV, webmail
ingress:
  enabled: false
  className: ""
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-body-size: 50m
  hosts:
    - host: mail.example.com
      paths:
        - path: /
          pathType: Prefix
          service: stalwart
  tls: []
  #   - secretName: mail-tls
  #     hosts:
  #       - mail.example.com

# -- TLS certificate via cert-manager
certificate:
  enabled: false
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames: []
  #   - mail.example.com
  secretName: mail-tls

# -- SnappyMail webmail (optional)
webmail:
  enabled: false
  image:
    repository: djmaze/snappymail
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 8888
  # -- Path prefix in ingress
  ingressPath: /webmail

# -- ClamAV antivirus (optional)
clamav:
  enabled: false
  image:
    repository: clamav/clamav
    tag: stable
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
  service:
    port: 3310

# -- Backup (optional)
backup:
  enabled: false
  schedule: "0 3 * * *"
  # -- Backup method:
  #   "pgdump"        = pg_dump to a PVC (simple, self-contained)
  #   "pgdump-restic" = pg_dump then push to restic repository (offsite)
  method: pgdump-restic
  pgdump:
    # -- PVC for pgdump-only backups (method=pgdump)
    persistence:
      storageClass: ""
      size: 20Gi
    # -- Number of dump files to retain on the PVC
    retainCount: 7
  restic:
    repository: ""  # e.g., s3:s3.example.com/mail-backups
    # -- Name of existing Secret with RESTIC_PASSWORD (and AWS_ACCESS_KEY_ID,
    # AWS_SECRET_ACCESS_KEY if using S3)
    existingSecret: ""
  retention:
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Prometheus ServiceMonitor (optional)
metrics:
  enabled: false
  interval: 30s
  path: /metrics
  port: http
